# Hexo Theme Butterfly
# https://github.com/jerryc127/hexo-theme-butterfly

# Theme
theme:
  # User interface
  uiux:
    # Global font settings
    # Don't modify the following unless you know how they work
    text_font_family:
    text_font_weight: 400
    site_name_font:
    site_name_font_weight: 400
    # Code
    code_font_family: 'JetBrains Mono'

# Menu
menu:
  首页: / || fa fa-home
  音乐: /music/ || fa fa-music
  电影: /movies/ || fa fa-film
  动漫: /anime/ || fa fa-tv
  漫画: /manga/ || fa fa-book
  小说: /novel/ || fa fa-book-open
  ASMR: /asmr/ || fa fa-headphones
  关于: /about/ || fa fa-user
  友情链接: /link/ || fa fa-link
  归档: /archives/ || fa fa-archive
  标签: /tags/ || fa fa-tags
  分类: /categories/ || fa fa-th

# Favicon
favicon: /img/favicon.png
# Avatar
avatar:
  img: /img/butterfly-icon.png
  effect: false

# Disable the highlight
highlight:
  enable: false

# Prisms
prismjs:
  enable: true
  preprocess: true
  line_number: true
  tab_replace: ''

# Search
search:
  path: search.json
  field: post
  content: true
  format: striptags

# Home page setting
index_site_info_top:
index_top_img_height:
index_post_content:
index_post_content_method: 3

# Article page setting
highlight_shrink: false
toc:
  enable: true
  number: true
  wrap: true
  expand_all: true
  scroll_percent: true

# Footer settings
footer:
  owner:
    enable: true
    copyright: true
  custom_text:
  runtime: true

# Post meta settings
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true

# Social settings
social:
  fab fa-github: https://github.com/MIXUULSS || Github
  fas fa-envelope: /about/ || Email

# img settings
img_lazyload:
  enable: true
  onlypost: false
  loadingImg:

# CDN
cdn:
  css_main_css: /css/index.css
  css_main: /css/main.css
  css_var: /css/var.css
  js_main: /js/main.js
  js_utils: /js/utils.js
  js_search_local: /js/search/local-search.js

# Font settings
font:
  font-size: 16px
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif