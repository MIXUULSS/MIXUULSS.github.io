<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSS博客 - 测试页面</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="header">
        <h1>🎉 LSS的个人博客测试页面</h1>
        <p>如果你看到这个页面有样式，说明基础部署成功</p>
    </div>
    
    <div class="content">
        <h2>📋 测试结果</h2>
        <div class="test-result">
            ✅ HTML正常加载
        </div>
        <div class="test-result">
            ⏳ CSS样式测试中...
        </div>
        <div class="test-result">
            🔍 页面基础功能验证
        </div>
    </div>
    
    <div class="content">
        <h2>🔗 快速链接</h2>
        <ul>
            <li><a href="/">🏠 返回首页</a></li>
            <li><a href="/music/">🎵 音乐页面</a></li>
            <li><a href="/movies/">🎬 电影页面</a></li>
            <li><a href="/anime/">🎌 动漫页面</a></li>
            <li><a href="/about/">👤 关于页面</a></li>
        </ul>
    </div>
    
    <script>
        // 测试JavaScript是否工作
        setTimeout(function() {
            const testElements = document.querySelectorAll('.test-result');
            if (testElements.length > 0) {
                testElements[1].innerHTML = '✅ CSS样式正常加载';
                testElements[1].style.background = '#d4edda';
            }
        }, 1000);
    </script>
</body>
</html>
