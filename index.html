<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSS博客 - 正在部署中</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .title {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #fff;
        }
        .status {
            font-size: 1.2em;
            margin: 20px 0;
        }
        .loading {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .links {
            margin-top: 30px;
        }
        .link {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }
        .link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎉 LSS博客</h1>
        <div class="loading"></div>
        <div class="status">
            <p><strong>博客正在部署中...</strong></p>
            <p>网站正在从GitHub Pages构建，请稍等片刻。</p>
            <p>预计需要2-5分钟完成部署。</p>
        </div>
        <div class="links">
            <a href="/about/" class="link">关于</a>
            <a href="/music/" class="link">音乐</a>
            <a href="/movies/" class="link">电影</a>
            <a href="/anime/" class="link">动漫</a>
        </div>
    </div>
    
    <script>
        // 每30秒检查一次网站是否可用
        setTimeout(() => {
            window.location.reload();
        }, 30000);
    </script>
</body>
</html>
