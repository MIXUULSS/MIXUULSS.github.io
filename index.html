<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSS个人博客 - 测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .status {
            color: #4CAF50;
            font-size: 18px;
            margin: 20px 0;
        }
        .info {
            color: #666;
            line-height: 1.6;
        }
        .test-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 LSS个人博客</h1>
        <div class="status">✅ 网站正常运行！</div>
        
        <div class="test-box">
            <h2>📋 系统检查</h2>
            <p class="info">如果你能看到这个页面，说明：</p>
            <ul style="text-align: left; display: inline-block;">
                <li>✅ GitHub Pages 部署成功</li>
                <li>✅ HTML 文件正常加载</li>
                <li>✅ CSS 样式正常渲染</li>
                <li>✅ 网络连接正常</li>
            </ul>
        </div>
        
        <div class="info">
            <p><strong>访问时间：</strong> <span id="time"></span></p>
            <p><strong>浏览器信息：</strong> <span id="browser"></span></p>
            <p><strong>当前页面：</strong> <span id="url"></span></p>
        </div>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
            <p style="color: #888; font-size: 14px;">
                如果之前看到白屏，现在应该可以正常显示了。<br>
                如果仍有问题，请刷新页面或清除浏览器缓存。
            </p>
        </div>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        document.getElementById('browser').textContent = navigator.userAgent;
        document.getElementById('url').textContent = window.location.href;
        
        console.log('LSS博客页面加载完成');
        console.log('当前时间:', new Date().toLocaleString('zh-CN'));
        console.log('浏览器:', navigator.userAgent);
        console.log('URL:', window.location.href);
    </script>
</body>
</html>
