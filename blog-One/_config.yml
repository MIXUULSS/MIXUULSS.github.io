# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: LSS的个人博客
subtitle: 记录生活，分享技术
description: 一个专注于技术分享和生活记录的个人博客
keywords: 技术,博客,生活,编程,Hexo
author: LSS
language: zh-CN
timezone: ''

# URL
url: https://mixuulss.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''

# Filename case
filename_case: 0

# Render
marked:
  gfm: false
  breaks: false
  pedantic: false
  sanitize: false
  smartLists: true
  smartypants: false

# Server
port: 4000
server_ip: 0.0.0.0
logger: false
logger_format: ''

# Date / Time format
date_format: YYYY-MM-DD HH:mm:ss
time_format: HH:mm:ss

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: butterfly

# Deployment
deploy:
  type: git
  repo: https://github.com/MIXUULSS/MIXUULSS.github.io
  branch: master
  message: 'Site updated: {{ now("YYYY-MM-DD HH:mm:ss") }}'